name: Metrics Dashboard
on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          repositories_affiliations: owner
          commits_authoring: Ayush Mishra, Ayush120704
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 6
          plugin_followup: yes
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_recent_load: 500
          plugin_languages_sections: most-used
          plugin_lines: yes
          plugin_notable: yes
          plugin_notable_repositories: yes
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 12
          plugin_activity: yes
          plugin_activity_limit: 10
          plugin_activity_days: 30
          plugin_activity_filter: issue, pr, release, fork, review
          plugin_reactions_display: absolute
          plugin_stargazers: yes
          plugin_stargazers_limit: 5
          plugin_repos: yes
          plugin_repositories_forks: yes
          plugin_stars: yes
          plugin_stars_limit: 5

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: output
          destination_dir: ./metrics
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          keep_files: true
